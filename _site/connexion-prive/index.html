<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Privée</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/login.css">
</head>
<body>

    <div class="login-container">
            <div class="login-header">
                <a href="/" class="logo-link">
                    <img src="/assets/images/logo/Logo-Franchini-2.jpg" alt="Logo Franchini">
                </a>
                <h2>Espace Privé</h2>
            </div>

            <form id="login-form" method="post" onsubmit="return false;">
                <div class="form-group">
                    <label for="email">Identifiant</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="email" id="email" name="email" class="form-control" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" class="form-control" required>
                        <i class="fas fa-eye toggle-password"></i>
                    </div>
                </div>
                
                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember-me" name="remember-me">
                        <label for="remember-me">Se souvenir de moi</label>
                    </div>
                    <a href="/pages/demande-reinitialisation.html">Mot de passe oublié ?</a>
                </div>
                
                <button type="submit" class="btn-login">Se connecter</button>
            </form>

            <div id="error-message" class="error-message"></div>
    </div>

    <script type="module" src="/assets/js/auth/firebase-config.js"></script>
    <script type="module" src="/assets/js/auth/login.js"></script>

</body>
</html>
