# Configuration Jekyll pour GitHub Pages
title: Franchini - Concessionnaire Deutz-Fahr
description: Site officiel du concessionnaire Deutz-Fahr Franchini
baseurl: ""
url: "https://cedric-f-26.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
# theme: jekyll-theme-primer
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - vendor/
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - node_modules
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - api/
  - admin-data.js
  - administrateur.html
  - connexion.html
  - .windsurf/

