# Configuration Jekyll pour GitHub Pages
title: Franchini - Concessionnaire Deutz-Fahr
description: Site officiel du concessionnaire Deutz-Fahr Franchini
baseurl: ""
url: "https://cedric-f-26.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - api/
  - admin-data.js
  - administrateur.html
  - connexion.html
  - .windsurf/

# Include
include:
  - _pages

# Collections
collections:
  pages:
    output: true
    permalink: /:name/
